name: OpenWebUI
services:
  OpenWebUI:
    image: ghcr.io/open-webui/open-webui:0.8.10@sha256:ee057955040ce91e3e787e4b7978c9c23e828972c68d01d787ed40f9a307df9f
    container_name: OpenWebUI
    restart: unless-stopped
    hostname: openwebui
    networks:
      - OpenWebUI
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENABLE_IMAGE_GENERATION=false
      - ENABLE_OLLAMA_API=false
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUMES}/OpenWebUI:/app/backend/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1GB

networks:
  OpenWebUI:
    name: OpenWebUI
    external: true
